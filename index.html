<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dipanjan Baidya - Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0510 0%, #1f103b 50%, #0a0510 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            padding: 40px 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Profile Section */
        .profile-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar-ring {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6ae37b, #c3f562, #4facfe);
            padding: 4px; /* Thickness of the glowing ring */
            box-shadow: 0 0 20px rgba(106, 227, 123, 0.4);
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #1a1025; /* Matches background to create gap */
            object-fit: cover;
            background-color: #1a1025;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .roles {
            font-size: 0.75rem;
            color: #e0e0e0;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .location {
            font-size: 0.8rem;
            color: #a0a0a0;
        }

        /* Links Section */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            background: linear-gradient(90deg, #6de882 0%, #c1f35f 100%);
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            color: #000000;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(109, 232, 130, 0.2);
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(109, 232, 130, 0.4);
        }

        .icon-wrapper {
            width: 45px;
            height: 45px;
            background: #111111;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .icon-wrapper i {
            color: #6de882;
            font-size: 1.2rem;
        }

        .text-wrapper {
            display: flex;
            flex-direction: column;
        }

        .link-title {
            font-weight: 700;
            font-size: 1rem;
            line-height: 1.2;
            letter-spacing: 0.5px;
        }

        .link-desc {
            font-size: 0.8rem;
            font-weight: 500;
            color: #333333;
        }

        /* Decorative background elements */
        .bg-glow {
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(147, 51, 234, 0.3);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
        }

        .glow-1 { top: -50px; left: -50px; }
        .glow-2 { bottom: -50px; right: -50px; }
        /* =========================================
           ✨ ANIMATIONS ✨
           ========================================= */

        /* 1. Floating effect for the main card */
        .container {
            animation: floatCard 6s ease-in-out infinite;
        }

        @keyframes floatCard {
            0% { transform: translateY(0px); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); }
            50% { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6); }
            100% { transform: translateY(0px); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); }
        }

        /* 2. Pulsing neon glow for the profile picture */
        .avatar-ring {
            animation: pulseGlow 3s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 15px rgba(106, 227, 123, 0.3); }
            100% { box-shadow: 0 0 35px rgba(195, 245, 98, 0.7); }
        }

        /* 3. Smooth pop-in effect for the buttons */
        .link-btn {
            opacity: 0; /* Hide them initially */
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Stagger the buttons so they load one after the other */
        .link-btn:nth-child(1) { animation-delay: 0.1s; }
        .link-btn:nth-child(2) { animation-delay: 0.25s; }
        .link-btn:nth-child(3) { animation-delay: 0.4s; }
        .link-btn:nth-child(4) { animation-delay: 0.55s; }

        @keyframes popIn {
            0% { 
                opacity: 0; 
                transform: translateY(30px) scale(0.9); 
            }
            100% { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }
        /* =========================================
           🔥 FIRE EMBERS ANIMATION 🔥
           ========================================= */
        .fire-embers {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2; /* Keeps it behind your card */
            pointer-events: none; /* Prevents it from blocking clicks */
            overflow: hidden;
        }

        .ember {
            position: absolute;
            bottom: -20px;
            width: 6px;
            height: 6px;
            background: #ff5722;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff9800, 0 0 20px #ff5722;
            opacity: 0;
            animation: floatEmber linear infinite;
        }

        /* Randomizing the speed, position, and delay of each spark */
        .ember:nth-child(1) { left: 10%; animation-duration: 4s; animation-delay: 0s; }
        .ember:nth-child(2) { left: 30%; animation-duration: 6s; animation-delay: 1s; }
        .ember:nth-child(3) { left: 50%; animation-duration: 5s; animation-delay: 2s; }
        .ember:nth-child(4) { left: 70%; animation-duration: 7s; animation-delay: 0.5s; }
        .ember:nth-child(5) { left: 90%; animation-duration: 4.5s; animation-delay: 1.5s; }
        .ember:nth-child(6) { left: 20%; animation-duration: 5.5s; animation-delay: 3s; }
        .ember:nth-child(7) { left: 80%; animation-duration: 6.5s; animation-delay: 2.5s; }
        .ember:nth-child(8) { left: 40%; animation-duration: 4.2s; animation-delay: 0.8s; }
        .ember:nth-child(9) { left: 60%; animation-duration: 5.8s; animation-delay: 1.2s; }
        .ember:nth-child(10) { left: 85%; animation-duration: 5s; animation-delay: 0.2s; }

        @keyframes floatEmber {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 1;
            }
            50% {
                transform: translateY(-50vh) translateX(20px) scale(0.8);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-100vh) translateX(-20px) scale(0);
                opacity: 0;
            }
        }
    </style>
</head>
