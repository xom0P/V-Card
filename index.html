<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dipanjan Baidya - Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0510 0%, #1f103b 50%, #0a0510 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            padding: 40px 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Profile Section */
        .profile-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar-ring {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6ae37b, #c3f562, #4facfe);
            padding: 4px; /* Thickness of the glowing ring */
            box-shadow: 0 0 20px rgba(106, 227, 123, 0.4);
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #1a1025; /* Matches background to create gap */
            object-fit: cover;
            background-color: #1a1025;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .roles {
            font-size: 0.75rem;
            color: #e0e0e0;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .location {
            font-size: 0.8rem;
            color: #a0a0a0;
        }

        /* Links Section */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            background: linear-gradient(90deg, #6de882 0%, #c1f35f 100%);
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            color: #000000;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(109, 232, 130, 0.2);
        }

        .link-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(109, 232, 130, 0.4);
        }

        .icon-wrapper {
            width: 45px;
            height: 45px;
            background: #111111;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .icon-wrapper i {
            color: #6de882;
            font-size: 1.2rem;
        }

        .text-wrapper {
            display: flex;
            flex-direction: column;
        }

        .link-title {
            font-weight: 700;
            font-size: 1rem;
            line-height: 1.2;
            letter-spacing: 0.5px;
        }

        .link-desc {
            font-size: 0.8rem;
            font-weight: 500;
            color: #333333;
        }

        /* Decorative background elements */
        .bg-glow {
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(147, 51, 234, 0.3);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
        }

        .glow-1 { top: -50px; left: -50px; }
        .glow-2 { bottom: -50px; right: -50px; }
        /* =========================================
           ✨ ANIMATIONS ✨
           ========================================= */

        /* 1. Floating effect for the main card */
        .container {
            animation: floatCard 6s ease-in-out infinite;
        }

        @keyframes floatCard {
            0% { transform: translateY(0px); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); }
            50% { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6); }
            100% { transform: translateY(0px); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); }
        }

        /* 2. Pulsing neon glow for the profile picture */
        .avatar-ring {
            animation: pulseGlow 3s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 15px rgba(106, 227, 123, 0.3); }
            100% { box-shadow: 0 0 35px rgba(195, 245, 98, 0.7); }
        }

        /* 3. Smooth pop-in effect for the buttons */
        .link-btn {
            opacity: 0; /* Hide them initially */
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Stagger the buttons so they load one after the other */
        .link-btn:nth-child(1) { animation-delay: 0.1s; }
        .link-btn:nth-child(2) { animation-delay: 0.25s; }
        .link-btn:nth-child(3) { animation-delay: 0.4s; }
        .link-btn:nth-child(4) { animation-delay: 0.55s; }

        @keyframes popIn {
            0% { 
                opacity: 0; 
                transform: translateY(30px) scale(0.9); 
            }
            100% { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }
      /* =========================================
           💻 MATRIX BACKGROUND 💻
           ========================================= */
        #matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -3; /* Keeps it strictly behind your main card */
            pointer-events: none;
        }
    </style>
</head>
<body>
  <canvas id="matrix-bg"></canvas>

    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="container">
        <div class="profile-section">
            <div class="avatar-ring">
                <img src="pfp.jpg" alt="Dipanjan Baidya" class="avatar">
            </div>
            <h1>Dipanjan Baidya</h1>
            <div class="roles">BUISNESS | CODER | DESIGNER</div>
            <div class="location">Turning Ideas Into Reality. Kolkata, India.</div>
        </div>

        <div class="links-container">
            <a href="https://www.instagram.com/xom669/" class="link-btn" target="_blank">
                <div class="icon-wrapper">
                    <i class="fab fa-instagram"></i>
                </div>
                <div class="text-wrapper">
                    <span class="link-title">INSTAGRAM</span>
                    <span class="link-desc">xom.669</span>
                </div>
            </a>

            <a href="mailto:dipanjanbaidya2007@gmail.com?subject=Reaching out from your portfolio!" class="link-btn">
                <div class="icon-wrapper">
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="text-wrapper">
                    <span class="link-title">EMAIL</span>
                    <span class="link-desc">REACH OUT</span>
                </div>
            </a>

            <a href="https://www.linkedin.com/in/dipanjanbaidya/" class="link-btn" target="_blank">
                <div class="icon-wrapper">
                    <i class="fab fa-linkedin-in"></i>
                </div>
                <div class="text-wrapper">
                    <span class="link-title">LINKEDIN</span>
                    <span class="link-desc">Dipanjan Baidya</span>
                </div>
            </a>

            <a href="#" class="link-btn">
                <div class="icon-wrapper">
                    <i class="far fa-clock"></i>
                </div>
                <div class="text-wrapper">
                    <span class="link-title">COMING SOON</span>
                    <span class="link-desc">New Projects 2026-27</span>
                </div>
            </a>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');

        let width, height, columns;
        const alphabet = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレゲゼデベペオォコソトノホモヨョロゴゾドボポヴッンABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        
        let fontSize = 16;
        let rainDrops = [];

        function initCanvas() {
            // Handle High-DPI (Retina) displays for crisp text on phones
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;

            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);

            // Make font slightly smaller on phone screens to fit more code streams
            fontSize = width < 600 ? 12 : 16; 
            columns = Math.floor(width / fontSize);

            rainDrops = [];
            for (let x = 0; x < columns; x++) {
                // Stagger the initial drops so they don't fall in a solid horizontal line
                rainDrops[x] = Math.random() * -100; 
            }
        }

        initCanvas();

        // Battery-saving frame rate controller
        let lastDrawTime = 0;
        const fps = 30; // 30fps is perfect for Matrix rain without draining phone battery
        const interval = 1000 / fps;

        const draw = (currentTime) => {
            // requestAnimationFrame is much smoother and stops running if the user switches tabs
            requestAnimationFrame(draw);

            const deltaTime = currentTime - lastDrawTime;
            if (deltaTime < interval) return;
            lastDrawTime = currentTime - (deltaTime % interval);

            ctx.fillStyle = 'rgba(10, 5, 16, 0.1)'; 
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = '#6de882'; 
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                // Only draw text if it's currently on the screen
                if (rainDrops[i] * fontSize > 0) {
                    const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                    ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                }

                if (rainDrops[i] * fontSize > height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };

        requestAnimationFrame(draw);

        // Smart Resize: Prevents the canvas from glitching when the mobile URL bar hides/shows
        let resizeTimer;
        let currentWidth = window.innerWidth;
        
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                // Only reset the canvas if the WIDTH changes (like rotating the phone)
                if (window.innerWidth !== currentWidth) {
                    currentWidth = window.innerWidth;
                    initCanvas();
                }
            }, 200);
        });
    </script>

</body>
</html>
